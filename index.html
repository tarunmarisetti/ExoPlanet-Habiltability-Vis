<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ============================= */
    /* PROJECT TITLE */
    /* ============================= */
    #projectTitle {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      z-index: 20;
      pointer-events: none;
      
    }

    #projectTitle h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    #projectTitle p {
      margin: 2px 0 0 0;
      font-size: 11px;
      opacity: 0.7;
    }

    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px;
      border-radius: 4px;
      pointer-events: none;
      font-size: 12px;
      display: none;
      z-index: 30;
    }

    #infoPanel {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 260px;
      background: rgba(0,0,20,0.85);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      backdrop-filter: blur(6px);
      z-index: 15;
    }

    /* ============================= */
    /* FILTER CONTROLS */
    /* ============================= */

    #filtersContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 15;
    }

    .controls {
      background: rgba(0,0,30,0.8);
      padding: 12px;
      border-radius: 8px;
      color: white;
      width: 250px;
      font-size: 13px;
    }

    .controls input {
      width: 100%;
    }

      #habitabilityPanel {
    position: absolute;
    left: 20px;
    top: 120px;
    width: 280px;
    background: rgba(0, 0, 20, 0.85);
    color: white;
    padding: 16px;
    border-radius: 10px;
    font-size: 13px;
    backdrop-filter: blur(6px);
    display: none; /* hidden by default */
    z-index: 20;
  }

  #habitabilityPanel h3 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 16px;
    letter-spacing: 0.5px;
  }

  #habitabilityPanel hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.2);
    margin: 10px 0;
  }

  .hz-good {
    color: #00ff88;
  }

  .hz-bad {
    color: #ff5555;
  }

  .panel-note {
    opacity: 0.65;
    font-size: 11px;
    margin-top: 6px;
  }

  </style>
</head>

<body>

<!-- ============================= -->
<!-- PROJECT TITLE -->
<!-- ============================= -->
<div id="projectTitle">
  <h1>Interactive Exoplanet Habitability Atlas</h1>
  <p>Exploring worlds with Earth-like characteristics beyond our solar system</p>
</div>


<!-- ============================= -->
<!-- FILTER WRAPPER (IMPORTANT) -->
<!-- ============================= -->
<div id="filtersContainer">
  <div class="controls">
    <div>
      <label>Minimum ESI: <span id="esiValue">0.50</span></label>
      <input type="range" id="esiSlider" min="0.48" max="0.83" step="0.01" value="0.48">
    </div>

    <div style="margin-top:10px;">
      <label>Max Distance (ly): <span id="distanceValue">5000</span></label>
      <input type="range" id="distanceSlider" min="0" max="5000" step="50" value="5000">
    </div>
    <p id="planetCount" style="opacity:0.7; font-size:12px; margin-top:4px;">
    Showing 39 Potentially Habitable Planets
    </p>

    <br/>
    <button id="toggleMode">Toggle Distance Mode</button>
  </div>
</div>

<!-- ============================= -->
<!-- SKY CANVAS -->
<!-- ============================= -->
<svg id="sky"></svg>

<div class="tooltip"></div>

<div id="infoPanel">
  <img id="planetImage" src="" style="width:100%; border-radius:8px; margin-bottom:10px;" />
  <h2 id="planetName">Click a planet to explore</h2>
  <p id="planetDetails"></p>
</div>

<!-- ============================= -->
<!-- Habitability Assessment Panel -->
<!-- ============================= -->
<div id="habitabilityPanel">
  <h3 id="habitabilityTitle">Habitability Assessment</h3>
  <div id="habitabilityContent"></div>
</div>

<script src="sky.js"></script>

</body>
</html>
